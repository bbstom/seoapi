<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>统计数据测试</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
        }
        .stats {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-top: 20px;
        }
        .stat-item {
            background: #f0f0f0;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
        }
        .stat-label {
            font-size: 14px;
            color: #666;
            margin-bottom: 5px;
        }
        .stat-value {
            font-size: 24px;
            font-weight: bold;
            color: #667eea;
        }
        button {
            padding: 10px 20px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }
        button:hover {
            background: #5568d3;
        }
        #result {
            margin-top: 20px;
            padding: 15px;
            background: #f9f9f9;
            border-radius: 8px;
            white-space: pre-wrap;
        }
    </style>
</head>
<body>
    <h1>统计数据测试</h1>
    <p>测试改写 API 返回的统计数据是否正确显示</p>
    
    <button onclick="testRewrite()">测试改写</button>
    
    <div id="result"></div>
    
    <div class="stats" id="stats"></div>
    
    <script>
        async function testRewrite() {
            const resultDiv = document.getElementById('result');
            const statsDiv = document.getElementById('stats');
            
            resultDiv.textContent = '正在改写...';
            statsDiv.innerHTML = '';
            
            try {
                const response = await fetch('/api/rewrite', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': 'sk_f7747efeefece9fbeb79bfecd825e01ff427c2f343acd398f6f3713469906d00'
                    },
                    body: JSON.stringify({
                        txt: 'AI technology is developing rapidly.',
                        mode: 'humanlike',
                        sim: 1
                    })
                });
                
                const data = await response.json();
                
                if (data.errcode !== '0') {
                    throw new Error(data.errmsg);
                }
                
                // 显示改写结果
                resultDiv.textContent = data.data;
                
                // 显示统计数据
                const meta = data._meta || {};
                const like = data.like ? (parseFloat(data.like) * 100).toFixed(1) : '0';
                
                statsDiv.innerHTML = `
                    <div class="stat-item">
                        <div class="stat-label">耗时</div>
                        <div class="stat-value">${meta.duration ? meta.duration.toFixed(2) : '-'}s</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-label">相似度</div>
                        <div class="stat-value">${like}%</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-label">输入 Tokens</div>
                        <div class="stat-value">${meta.usage ? meta.usage.input_tokens : '-'}</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-label">输出 Tokens</div>
                        <div class="stat-value">${meta.usage ? meta.usage.output_tokens : '-'}</div>
                    </div>
                `;
                
                console.log('完整响应数据:', data);
                console.log('_meta 数据:', meta);
                console.log('相似度:', data.like);
                
            } catch (error) {
                resultDiv.textContent = '错误: ' + error.message;
            }
        }
    </script>
</body>
</html>
