<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>复制功能测试</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 600px;
            margin: 50px auto;
            padding: 20px;
        }
        .test-box {
            background: #f0f0f0;
            padding: 20px;
            border-radius: 8px;
            margin: 20px 0;
        }
        button {
            padding: 10px 20px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            margin: 5px;
        }
        button:hover {
            background: #5568d3;
        }
        .alert {
            padding: 15px;
            border-radius: 8px;
            margin: 10px 0;
            display: none;
        }
        .alert.show {
            display: block;
        }
        .alert-success {
            background: #d4edda;
            color: #155724;
        }
        .alert-error {
            background: #f8d7da;
            color: #721c24;
        }
        #test-text {
            background: white;
            padding: 15px;
            border-radius: 5px;
            margin: 10px 0;
            white-space: pre-wrap;
        }
    </style>
</head>
<body>
    <h1>复制功能测试</h1>
    
    <div class="test-box">
        <h3>测试文本</h3>
        <div id="test-text">这是一段测试文本，用于测试复制功能是否正常工作。
包含多行内容。
可以复制这段文本到剪贴板。</div>
        
        <button onclick="testCopy1()">方法1: Clipboard API</button>
        <button onclick="testCopy2()">方法2: execCommand</button>
        <button onclick="testCopy3()">方法3: 智能选择</button>
    </div>
    
    <div id="alert-container"></div>
    
    <div class="test-box">
        <h3>测试结果</h3>
        <p>点击上面的按钮测试不同的复制方法</p>
        <p>如果复制成功，会显示成功提示</p>
        <p>然后你可以在任何地方粘贴（Ctrl+V）来验证</p>
    </div>
    
    <script>
        function showAlert(message, type) {
            const container = document.getElementById('alert-container');
            container.innerHTML = `<div class="alert alert-${type} show">${message}</div>`;
            setTimeout(() => {
                container.innerHTML = '';
            }, 3000);
        }
        
        // 方法1: 使用现代 Clipboard API
        function testCopy1() {
            const text = document.getElementById('test-text').textContent;
            
            if (navigator.clipboard && navigator.clipboard.writeText) {
                navigator.clipboard.writeText(text).then(() => {
                    showAlert('✅ 方法1成功：已使用 Clipboard API 复制', 'success');
                    console.log('Clipboard API 复制成功');
                }).catch(err => {
                    showAlert('❌ 方法1失败：' + err.message, 'error');
                    console.error('Clipboard API 失败:', err);
                });
            } else {
                showAlert('❌ 方法1不可用：浏览器不支持 Clipboard API', 'error');
                console.log('浏览器不支持 Clipboard API');
            }
        }
        
        // 方法2: 使用 execCommand (备用方法)
        function testCopy2() {
            const text = document.getElementById('test-text').textContent;
            const textarea = document.createElement('textarea');
            textarea.value = text;
            textarea.style.position = 'fixed';
            textarea.style.opacity = '0';
            document.body.appendChild(textarea);
            textarea.select();
            
            try {
                const successful = document.execCommand('copy');
                if (successful) {
                    showAlert('✅ 方法2成功：已使用 execCommand 复制', 'success');
                    console.log('execCommand 复制成功');
                } else {
                    showAlert('❌ 方法2失败：execCommand 返回 false', 'error');
                    console.log('execCommand 返回 false');
                }
            } catch (err) {
                showAlert('❌ 方法2失败：' + err.message, 'error');
                console.error('execCommand 失败:', err);
            }
            
            document.body.removeChild(textarea);
        }
        
        // 方法3: 智能选择（先尝试 Clipboard API，失败则用 execCommand）
        function testCopy3() {
            const text = document.getElementById('test-text').textContent;
            
            if (navigator.clipboard && navigator.clipboard.writeText) {
                navigator.clipboard.writeText(text).then(() => {
                    showAlert('✅ 方法3成功：使用了 Clipboard API', 'success');
                    console.log('方法3: Clipboard API 成功');
                }).catch(err => {
                    console.log('方法3: Clipboard API 失败，尝试备用方法');
                    fallbackCopy(text);
                });
            } else {
                console.log('方法3: 不支持 Clipboard API，使用备用方法');
                fallbackCopy(text);
            }
        }
        
        function fallbackCopy(text) {
            const textarea = document.createElement('textarea');
            textarea.value = text;
            textarea.style.position = 'fixed';
            textarea.style.opacity = '0';
            document.body.appendChild(textarea);
            textarea.select();
            
            try {
                const successful = document.execCommand('copy');
                if (successful) {
                    showAlert('✅ 方法3成功：使用了 execCommand（备用）', 'success');
                    console.log('方法3: execCommand 成功');
                } else {
                    showAlert('❌ 方法3失败：所有方法都失败了', 'error');
                    console.log('方法3: execCommand 失败');
                }
            } catch (err) {
                showAlert('❌ 方法3失败：' + err.message, 'error');
                console.error('方法3: execCommand 异常:', err);
            }
            
            document.body.removeChild(textarea);
        }
        
        // 页面加载时检测浏览器支持
        window.onload = function() {
            console.log('=== 浏览器复制功能检测 ===');
            console.log('navigator.clipboard:', navigator.clipboard ? '支持' : '不支持');
            console.log('navigator.clipboard.writeText:', navigator.clipboard?.writeText ? '支持' : '不支持');
            console.log('document.execCommand:', document.execCommand ? '支持' : '不支持');
            console.log('========================');
        };
    </script>
</body>
</html>
