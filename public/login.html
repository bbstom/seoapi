<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - SEO API</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: #f8fafc;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .login-container {
            background: white;
            border-radius: 16px;
            padding: 40px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
            border: 1px solid #e2e8f0;
        }
        
        .logo {
            text-align: center;
            margin-bottom: 36px;
        }
        
        .logo-icon {
            width: 64px;
            height: 64px;
            background: linear-gradient(135deg, #00A3FF 0%, #0284c7 100%);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 28px;
            font-weight: 900;
            margin: 0 auto 20px;
        }
        
        .logo h1 {
            font-size: 24px;
            margin-bottom: 8px;
            color: #1e293b;
            font-weight: 900;
        }
        
        .logo p {
            color: #64748b;
            font-size: 14px;
            font-weight: 500;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 700;
            color: #1e293b;
            font-size: 14px;
        }
        
        input {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            font-size: 14px;
            transition: all 0.2s;
            background: white;
        }
        
        input:focus {
            outline: none;
            border-color: #00A3FF;
            box-shadow: 0 0 0 3px rgba(0, 163, 255, 0.1);
        }

        input::placeholder {
            color: #94a3b8;
        }
        
        .btn {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            background: #00A3FF;
            color: white;
        }
        
        .btn:hover {
            background: #0284c7;
        }
        
        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        
        .alert {
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
            font-size: 14px;
            font-weight: 500;
            border-left: 3px solid;
        }
        
        .alert.show {
            display: block;
        }
        
        .alert-error {
            background: #fee2e2;
            color: #991b1b;
            border-color: #ef4444;
        }
        
        .alert-success {
            background: #d1fae5;
            color: #065f46;
            border-color: #10b981;
        }
        
        .default-account {
            background: #fef3c7;
            border: 1px solid #fde047;
            border-left: 3px solid #eab308;
            padding: 16px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 13px;
            color: #713f12;
            font-weight: 500;
        }
        
        .default-account strong {
            color: #713f12;
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            font-weight: 700;
        }
        
        .default-account small {
            color: #713f12;
            font-size: 12px;
            display: block;
            margin-top: 8px;
            font-weight: 600;
        }
        
        .footer {
            text-align: center;
            margin-top: 24px;
            color: #94a3b8;
            font-size: 13px;
            font-weight: 500;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo">
            <div class="logo-icon">S</div>
            <h1>SEO API</h1>
            <p>Claude AI 智能文本改写服务</p>
        </div>
        
        <div class="default-account">
            <strong>默认管理员账号：</strong><br>
            用户名: admin<br>
            密码: admin123<br>
            <small>首次登录后请立即修改密码</small>
        </div>
        
        <div id="alert" class="alert"></div>
        
        <form id="login-form" onsubmit="handleLogin(event)">
            <div class="form-group">
                <label for="username">用户名</label>
                <input type="text" id="username" name="username" required autofocus>
            </div>
            
            <div class="form-group">
                <label for="password">密码</label>
                <input type="password" id="password" name="password" required>
            </div>
            
            <button type="submit" class="btn" id="login-btn">登录</button>
        </form>
        
        <div class="footer">
            SEO API v1.0.0 - Powered by Claude AI
        </div>
    </div>
    
    <script>
        function showAlert(message, type = 'error') {
            const alert = document.getElementById('alert');
            alert.className = `alert alert-${type} show`;
            alert.textContent = message;
            
            setTimeout(() => {
                alert.classList.remove('show');
            }, 5000);
        }
        
        async function handleLogin(event) {
            event.preventDefault();
            
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const btn = document.getElementById('login-btn');
            
            if (!username || !password) {
                showAlert('请输入用户名和密码');
                return;
            }
            
            btn.disabled = true;
            btn.textContent = '登录中...';
            
            try {
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ username, password })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    // 保存 token
                    localStorage.setItem('sessionToken', data.token);
                    localStorage.setItem('username', data.user.username);
                    localStorage.setItem('role', data.user.role);
                    
                    showAlert('登录成功，正在跳转...', 'success');
                    
                    // 跳转到主界面
                    setTimeout(() => {
                        window.location.href = '/index.html';
                    }, 1000);
                } else {
                    showAlert(data.error || '登录失败');
                    btn.disabled = false;
                    btn.textContent = '登录';
                }
                
            } catch (error) {
                showAlert('登录失败: ' + error.message);
                btn.disabled = false;
                btn.textContent = '登录';
            }
        }
        
        // 检查是否已登录
        window.onload = function() {
            const token = localStorage.getItem('sessionToken');
            if (token) {
                // 验证 token 是否有效
                fetch('/api/auth/me', {
                    headers: {
                        'x-session-token': token
                    }
                })
                .then(res => res.json())
                .then(data => {
                    if (data.success) {
                        // 已登录，跳转到主界面
                        window.location.href = '/index.html';
                    }
                });
            }
        };
    </script>
</body>
</html>
